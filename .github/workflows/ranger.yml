name: Ranger Agent

# Triggers when an issue is labeled "auto-fix". Drop the label on any issue
# to fire the agent: it will clone this repo, follow .ranger/skills/, make
# edits, run validation, and open a draft PR with the changes.
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task:
        description: "Manual task description (used when not triggered from an issue)"
        required: true
        type: string

jobs:
  ranger:
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'issues' && github.event.label.name == 'auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # branch + commit
      pull-requests: write  # gh pr create
      issues: write         # comment on triggering issue (Phase 4)
    timeout-minutes: 30
    concurrency:
      group: ranger-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use RANGER_BOT_PAT (fine-grained PAT with workflows:write) so
          # the agent can update .github/workflows/* — bootstrap skills
          # rely on this. Falls back to GITHUB_TOKEN in degraded mode
          # (everything works EXCEPT workflow edits and PR-triggered
          # downstream CI). See docs/PREREQUISITE-STATE.md.
          token: ${{ secrets.RANGER_BOT_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ranger-agent
        env:
          # Auth needed when ranger-agent is a private repo.
          # Falls back to the workflow GITHUB_TOKEN if no PAT is set.
          GH_TOKEN: ${{ secrets.RANGER_BOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://x-access-token:${GH_TOKEN}@github.com/illuma-ai/ranger-agent.git@main"

      - name: Install demo deps
        run: |
          pip install -e ".[dev]"

      - name: Configure git identity for the bot
        run: |
          git config --global user.email "ranger-agent[bot]@users.noreply.github.com"
          git config --global user.name "ranger-agent"

      - name: Resolve task source
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.task }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            # Triggered by issue label — agent fetches via gh
            echo "issue=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run agent and open PR
        env:
          BEDROCK_AWS_DEFAULT_REGION: ${{ secrets.BEDROCK_AWS_DEFAULT_REGION }}
          BEDROCK_AWS_ACCESS_KEY_ID: ${{ secrets.BEDROCK_AWS_ACCESS_KEY_ID }}
          BEDROCK_AWS_SECRET_ACCESS_KEY: ${{ secrets.BEDROCK_AWS_SECRET_ACCESS_KEY }}
          # gh CLI uses GH_TOKEN automatically; this is the same token
          # actions/checkout used so the credential helper already has it.
          GH_TOKEN: ${{ secrets.RANGER_BOT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ steps.task.outputs.issue }}" ]; then
            ranger run \
              --working-dir "$(pwd)" \
              --issue "${{ steps.task.outputs.issue }}" \
              --repo "${{ github.repository }}" \
              --no-mcp \
              --cost-limit 15.00 \
              --step-limit 300 \
              --wall-clock 1800 \
              --create-pr \
              --pr-base-branch "${{ github.event.repository.default_branch }}" \
              --trajectory ./ranger-trajectory.json
          else
            ranger run \
              --working-dir "$(pwd)" \
              --task "${{ steps.task.outputs.task }}" \
              --no-mcp \
              --cost-limit 15.00 \
              --step-limit 300 \
              --wall-clock 1800 \
              --create-pr \
              --pr-base-branch "${{ github.event.repository.default_branch }}" \
              --trajectory ./ranger-trajectory.json
          fi

      - name: Upload trajectory artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranger-trajectory
          path: ranger-trajectory.json
          if-no-files-found: ignore
